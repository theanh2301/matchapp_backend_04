<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            /* Nền gradient nhẹ nhàng giúp nổi bật form đăng nhập */
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px; /* Rộng hơn một chút để thoáng mắt */
            padding: 2.5rem 2rem;
            background-color: #ffffff;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
        .input-group-text {
            background-color: transparent;
            color: #6c757d;
        }
        .btn-primary {
            border-radius: 8px;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card login-card">

        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 60px; height: 60px;">
                <i class="bi bi-shield-lock-fill fs-2"></i>
            </div>
            <h3 class="fw-bold text-dark mb-1">Admin Portal</h3>
            <p class="text-muted small">Please sign in to your account</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center py-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <div class="small">
                Sai tài khoản hoặc mật khẩu!
            </div>
        </div>

        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center py-2" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <div class="small">
                Đăng xuất thành công.
            </div>
        </div>

        <form th:action="@{/admin/login}" method="post">

            <div class="mb-3">
                <label class="form-label fw-semibold text-dark small mb-1">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <input type="email"
                           name="username"
                           class="form-control border-start-0 ps-0"
                           placeholder="admin@example.com"
                           required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label fw-semibold text-dark small mb-0">Password</label>
                </div>
                <div class="input-group">
                    <span class="input-group-text border-end-0">
                        <i class="bi bi-key"></i>
                    </span>
                    <input type="password"
                           name="password"
                           class="form-control border-start-0 ps-0"
                           placeholder="Enter password"
                           required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 d-flex justify-content-center align-items-center">
                <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
            </button>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
