<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activeMenu)" class="admin-sidebar">
    <div class="sidebar-brand">
        <a th:href="@{/admin}" data-admin-link style="color:#ffffff;font-size:22px;font-weight:700;text-decoration:none;">MathApp Admin</a>
    </div>

    <nav class="sidebar-nav" style="display:flex;flex-direction:column;gap:10px;">
        <a th:href="@{/admin/home-content}" th:style="${activeMenu == 'dashboard'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Dashboard</a>
        <a th:href="@{/admin/users}" th:style="${activeMenu == 'users'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Users</a>
        <a th:href="@{/admin/subjects}" th:style="${activeMenu == 'subjects'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Subjects</a>
        <a th:href="@{/admin/chapters}" th:style="${activeMenu == 'chapters'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Chapters</a>
        <a th:href="@{/admin/lessons}" th:style="${activeMenu == 'lessons'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Lessons</a>
        <a th:href="@{/admin/flashcards}" th:style="${activeMenu == 'flashcards'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Flashcards</a>
        <a th:href="@{/admin/match-cards}" th:style="${activeMenu == 'matchcards'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Match Cards</a>
        <a th:href="@{/admin/questions}" th:style="${activeMenu == 'quiz-questions'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Quiz Questions</a>
        <a th:href="@{/admin/quiz-answers}" th:style="${activeMenu == 'quiz-answers'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Quiz Answers</a>
        <a th:href="@{/admin/practices}" th:style="${activeMenu == 'practices'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Practices</a>
        <a th:href="@{/admin/practice-questions}" th:style="${activeMenu == 'practice-questions'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Practice Questions</a>
        <a th:href="@{/admin/practice-answers}" th:style="${activeMenu == 'practice-answers'} ? 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:#2f56d9;font-size:15px;line-height:1.35;' : 'display:block;color:#ffffff;text-decoration:none;padding:12px 14px;border-radius:12px;background:transparent;font-size:15px;line-height:1.35;'" data-admin-link>Practice Answers</a>
    </nav>

    <form th:action="@{/admin/logout}" method="post" class="sidebar-logout" style="margin-top:auto;">
        <button type="submit" style="width:100%;border:none;background:#ef4444;color:#ffffff;padding:10px 12px;border-radius:10px;cursor:pointer;">Logout</button>
    </form>
</aside>

<script th:fragment="sidebar-script">
    document.querySelectorAll('[data-admin-link]').forEach(link => {
        link.addEventListener('click', event => {
            const topDoc = window.top && window.top.document;
            const frame = topDoc ? topDoc.getElementById('adminContentFrame') : null;
            if (!frame) {
                return;
            }
            event.preventDefault();
            frame.src = link.href;
            topDoc.querySelectorAll('.sidebar-nav a').forEach(item => item.classList.remove('active'));
            const mirror = Array.from(topDoc.querySelectorAll('.sidebar-nav a')).find(item => item.href === link.href);
            if (mirror) {
                mirror.classList.add('active');
            }
        });
    });
</script>
</body>
</html>
