<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${user.id == null} ? 'Create User' : 'Edit User'"></title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body {
      background-color: #f4f7f6;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .form-card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.04);
      max-width: 800px;
      margin: 0 auto;
    }
    .card-header-custom {
      background-color: #fff;
      border-bottom: 1px solid rgba(0,0,0,.05);
      border-radius: 12px 12px 0 0;
    }
    .input-group-text {
      background-color: #f8f9fa;
      border-right: none;
    }
    .form-control, .form-select {
      border-left: none;
    }
    .btn {
      border-radius: 8px;
      font-weight: 500;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <div class="card form-card">

    <div class="card-header-custom p-4 d-flex align-items-center">
      <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center me-3"
           style="width: 48px; height: 48px;">
        <i class="bi fs-4"
           th:classappend="${user.id == null} ? 'bi-person-plus-fill' : 'bi-person-gear'"></i>
      </div>
      <h4 class="mb-0 fw-bold"
          th:text="${user.id == null} ? 'Create User' : 'Edit User'"></h4>
    </div>

    <div class="card-body p-4">

      <form th:object="${user}"
            method="post"
            th:action="${user.id == null} ? '/admin/users/create' : '/admin/users/edit'">

        <input type="hidden" th:field="*{id}"/>

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Full Name *</label>
            <input th:field="*{fullName}" class="form-control" required/>
          </div>

          <div class="col-md-6">
            <label class="form-label">Email *</label>
            <input type="email" th:field="*{email}" class="form-control" required/>
          </div>

          <div class="col-md-6" th:if="${user.id == null}">
            <label class="form-label">Password *</label>
            <input type="password" name="password" class="form-control" required/>
          </div>

          <div class="col-md-6">
            <label class="form-label">Role</label>
            <select th:field="*{role}" class="form-select">
              <option value="USER">USER</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Grade *</label>
            <select name="gradeId" class="form-select" required>
              <option value="">-- Select Grade --</option>
              <option th:each="g : ${grades}"
                      th:value="${g.id}"
                      th:text="${g.gradeName}"
                      th:selected="${user.grade != null and user.grade.id == g.id}">
              </option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input th:field="*{phone}" class="form-control"/>
          </div>

          <div class="col-md-6">
            <label class="form-label">Date of Birth</label>
            <input type="date" th:field="*{dob}" class="form-control"/>
          </div>

          <div class="col-md-6">
            <label class="form-label">Status</label>
            <input th:field="*{status}" class="form-control"/>
          </div>

          <div class="col-md-6 d-flex align-items-end">
            <div class="form-check mb-2">
              <input type="checkbox" th:field="*{isPremium}" class="form-check-input" id="premiumCheck">
              <label class="form-check-label" for="premiumCheck">Premium User</label>
            </div>
          </div>

          <div class="col-12">
            <label class="form-label">Avatar URL</label>
            <input th:field="*{avatarUrl}" class="form-control"/>
          </div>

        </div>

        <div th:if="${error}" class="alert alert-danger mt-3">
          <span th:text="${error}"></span>
        </div>

        <hr class="mt-4 mb-4">

        <div class="d-flex justify-content-end gap-2">
          <a href="/admin/users" class="btn btn-light border">Cancel</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-floppy"></i>
            <span th:text="${user.id == null} ? 'Create' : 'Update'"></span>
          </button>
        </div>

      </form>
    </div>
  </div>

</div>

</body>
</html>
