<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.04) !important;
        }
        .btn {
            border-radius: 8px;
            font-weight: 500;
        }
        .table > :not(caption) > * > * {
            padding: 1rem 1rem;
        }
        .icon-square {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        /* Chỉnh lại độ rộng cột checkbox */
        .col-checkbox {
            width: 50px;
            text-align: center;
        }
    </style>

</head>
<body>

<div class="container-fluid max-width-xl mt-4 px-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h3 class="fw-bold mb-0 text-dark">
            <i class="bi bi-people-fill text-primary me-2"></i>User Management
        </h3>

        <div class="d-flex gap-2">
            <button type="button" id="btnBulkDelete" class="btn btn-danger shadow-sm d-none" onclick="submitBulkDelete()">
                <i class="bi bi-trash me-2"></i> Delete Selected
            </button>

            <a href="/admin/users/export" class="btn btn-outline-secondary">
                <i class="bi bi-download me-2"></i> Export
            </a>
            <a href="/admin/users/create" class="btn btn-primary shadow-sm">
                <i class="bi bi-plus-lg me-2"></i> Create User
            </a>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body p-3">
            <div class="row gx-3 gy-2 align-items-center">

                <div class="col-12 col-md-6">
                    <form method="get" th:action="@{/admin/users}" class="input-group">

    <span class="input-group-text bg-white border-end-0">
      <i class="bi bi-search text-muted"></i>
    </span>

                        <input type="text" name="keyword" th:value="${keyword}"
                               class="form-control border-start-0 ps-0"
                               placeholder="Search by email or name...">

                        <button type="submit" class="btn btn-primary px-3">Search</button>

                        <a th:href="@{/admin/users}"
                           th:if="${keyword != null and !keyword.isEmpty()}"
                           class="btn btn-outline-secondary px-3"
                           title="Xóa tìm kiếm">
                            Reset
                        </a>

                    </form>
                </div>

                <div class="col-md-auto d-none d-md-block">
                    <div class="vr h-100 mx-2 text-muted"></div>
                </div>

                <div class="col-12 col-md-auto flex-grow-1">
                    <form action="/admin/users/import" method="post" enctype="multipart/form-data" class="d-flex gap-2">
                        <input type="file" name="file" class="form-control" required style="max-width: 250px;">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-upload me-2"></i> Import Excel
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">

            <form id="bulkActionForm" action="/admin/users/bulk-delete" method="post">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">

                        <thead class="table-light text-muted">
                        <tr>
                            <th class="ps-4 col-checkbox">
                                <input class="form-check-input shadow-none" type="checkbox" id="selectAll">
                            </th>
                            <th>User</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>DOB</th>
                            <th>Status</th>
                            <th>Premium</th>
                            <th>Grade</th>
                            <th>Role</th>
                            <th>Created</th>
                            <th class="pe-4 text-end">Actions</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:if="${users == null || #lists.isEmpty(users.content)}">
                            <td colspan="11" class="text-center py-5 text-muted">
                                No users found
                            </td>
                        </tr>

                        <tr th:each="u : ${users.content}">

                            <td class="ps-4 text-center">
                                <input class="form-check-input row-checkbox shadow-none" type="checkbox" name="ids" th:value="${u.id}">
                            </td>

                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="icon-square bg-primary bg-opacity-10 text-primary me-3">
                                        <i class="bi bi-person-fill"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold" th:text="${u.fullName}"></div>
                                    </div>
                                </div>
                            </td>

                            <td th:text="${u.email}"></td>
                            <td th:text="${u.phone} ?: '-'"></td>
                            <td th:text="${u.dob} ?: '-'"></td>
                            <td th:text="${u.status} ?: '-'"></td>
                            <td>
                                <span th:if="${u.isPremium}" class="badge bg-success">YES</span>
                                <span th:if="${!u.isPremium}" class="badge bg-secondary">NO</span>
                            </td>
                            <td th:text="${u.grade != null ? u.grade.gradeName : '-'}"></td>
                            <td>
                                <span class="badge bg-primary" th:text="${u.role}"></span>
                            </td>
                            <td th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd HH:mm')}"></td>

                            <td class="text-end pe-4">
                                <a th:href="@{/admin/users/edit/{id}(id=${u.id})}"
                                   class="btn btn-sm btn-light text-primary">
                                    <i class="bi bi-pencil-square"></i>
                                </a>
                                <a th:href="@{/admin/users/delete/{id}(id=${u.id})}"
                                   class="btn btn-sm btn-light text-danger"
                                   onclick="return confirm('Delete this user?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>

                        </tbody>
                    </table>
                </div>
            </form>

        </div>

        <div class="card-footer bg-white border-top p-3 d-flex flex-column flex-md-row justify-content-between align-items-center" th:if="${users != null and users.totalPages > 1}">

            <div class="text-muted mb-2 mb-md-0 small">
                Showing <span class="fw-bold" th:text="${users.number * users.size + 1}"></span> to
                <span class="fw-bold" th:text="${(users.number + 1) * users.size < users.totalElements ? (users.number + 1) * users.size : users.totalElements}"></span>
                of <span class="fw-bold" th:text="${users.totalElements}"></span> entries
            </div>

            <nav aria-label="Page navigation">
                <ul class="pagination pagination-sm mb-0">

                    <li class="page-item" th:classappend="${users.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/users(keyword=${keyword}, page=${users.number - 1})}">Previous</a>
                    </li>

                    <li class="page-item" th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                        th:classappend="${users.number == i ? 'active' : ''}">
                        <a class="page-link" th:href="@{/admin/users(keyword=${keyword}, page=${i})}" th:text="${i + 1}"></a>
                    </li>

                    <li class="page-item" th:classappend="${users.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/users(keyword=${keyword}, page=${users.number + 1})}">Next</a>
                    </li>

                </ul>
            </nav>

        </div>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const selectAll = document.getElementById('selectAll');
        const rowCheckboxes = document.querySelectorAll('.row-checkbox');
        const btnBulkDelete = document.getElementById('btnBulkDelete');

        // Cập nhật trạng thái nút Xóa
        function updateBulkDeleteBtn() {
            const checkedCount = document.querySelectorAll('.row-checkbox:checked').length;
            if (checkedCount > 0) {
                btnBulkDelete.classList.remove('d-none');
            } else {
                btnBulkDelete.classList.add('d-none');
            }
        }

        // Sự kiện khi bấm "Chọn tất cả"
        if(selectAll) {
            selectAll.addEventListener('change', function() {
                rowCheckboxes.forEach(cb => cb.checked = this.checked);
                updateBulkDeleteBtn();
            });
        }

        // Sự kiện khi bấm từng ô checkbox
        rowCheckboxes.forEach(cb => {
            cb.addEventListener('change', function() {
                const allChecked = document.querySelectorAll('.row-checkbox:checked').length === rowCheckboxes.length;
                selectAll.checked = allChecked;
                updateBulkDeleteBtn();
            });
        });
    });

    // Hàm xác nhận và submit form Xóa hàng loạt
    function submitBulkDelete() {
        if(confirm('Bạn có chắc chắn muốn xóa những người dùng đã chọn không? Hành động này không thể hoàn tác.')) {
            document.getElementById('bulkActionForm').submit();
        }
    }
</script>

</body>
</html>
