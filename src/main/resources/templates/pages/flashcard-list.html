<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flashcard Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { margin: 0; background-color: #f4f7f6; }
        .admin-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .admin-content { padding: 24px; }
        .admin-sidebar {
            background: #0f172a;
            color: #ffffff;
            padding: 28px 18px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .sidebar-brand a {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            text-decoration: none;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar-nav a {
            color: #ffffff;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.35;
            transition: background-color .2s ease;
        }
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: #2f56d9;
            color: #ffffff;
        }
        .sidebar-logout { margin-top: auto; }
        .sidebar-logout button {
            width: 100%;
            border: none;
            background: #ef4444;
            color: #ffffff;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
        }
        #lessonDropdown { display: none; max-height: 200px; overflow-y: auto; }
        #lessonDropdown.show { display: block; }
    </style>
</head>

<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar(activeMenu=${activeMenu})}"></div>
    <div class="admin-content">
<div class="container">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- HEADER -->
    <div class="d-flex justify-content-between mb-3">
        <h3>Flashcard Management</h3>

        <div>
            <button id="btnBulkDelete" class="btn btn-danger d-none" onclick="submitBulkDelete()">
                Delete Selected
            </button>

            <a href="/admin/flashcards/export" class="btn btn-outline-secondary">Export</a>

            <button class="btn btn-primary" onclick="openCreateModal()">
                Create Flashcard
            </button>
        </div>
    </div>

    <!-- SEARCH + IMPORT -->
    <div class="card mb-3">
        <div class="card-body d-flex justify-content-between">

            <form method="get" th:action="@{/admin/flashcards}" class="d-flex">
                <div class="input-group">

                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           class="form-control"
                           placeholder="Search flashcard...">

                    <button class="btn btn-primary">Search</button>

                    <a th:if="${keyword != null and !#strings.isEmpty(keyword)}"
                       th:href="@{/admin/flashcards}"
                       class="btn btn-outline-secondary">
                        Reset
                    </a>

                </div>
            </form>

            <form action="/admin/flashcards/import" method="post" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <button class="btn btn-success">Import</button>
            </form>

        </div>
    </div>

    <!-- TABLE -->
    <form id="bulkForm" action="/admin/flashcards/bulk-delete" method="post">

        <table class="table table-bordered">

            <thead>
            <tr>
                <th><input type="checkbox" id="selectAll"></th>
                <th>ID</th>
                <th>Front</th>
                <th>Back</th>
                <th>Hint</th>
                <th>XP</th>
                <th>Lesson</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="f : ${flashcards.content}">
                <td><input type="checkbox" name="ids" th:value="${f.id}" class="row-checkbox"></td>

                <td th:text="${f.id}"></td>
                <td th:text="${f.frontText}"></td>
                <td th:text="${f.backText}"></td>
                <td th:text="${f.hint}"></td>
                <td th:text="${f.xpReward}"></td>
                <td th:text="${f.lesson != null ? f.lesson.lessonName : '-'}"></td>

                <td>
                    <button type="button" class="btn btn-sm btn-primary"
                            th:attr="onclick=|openEditModal(${f.id}, '${#strings.escapeJavaScript(f.frontText)}', '${#strings.escapeJavaScript(f.backText)}', '${#strings.escapeJavaScript(f.hint)}', ${f.xpReward}, ${f.lesson.id}, '${#strings.escapeJavaScript(f.lesson.lessonName)}')|">
                        Edit
                    </button>

                    <a th:href="@{/admin/flashcards/delete/{id}(id=${f.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete?')">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>

        </table>
    </form>

    <!-- PAGINATION -->
    <nav th:if="${flashcards.totalPages > 1}">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${flashcards.first} ? ' disabled'">
                <a class="page-link"
                   th:href="@{/admin/flashcards(page=${flashcards.number - 1}, keyword=${keyword})}">
                    Prev
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, flashcards.totalPages - 1)}"
                th:classappend="${flashcards.number == i} ? ' active'">

                <a class="page-link"
                   th:href="@{/admin/flashcards(page=${i}, keyword=${keyword})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item" th:classappend="${flashcards.last} ? ' disabled'">
                <a class="page-link"
                   th:href="@{/admin/flashcards(page=${flashcards.number + 1}, keyword=${keyword})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>
</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="flashcardModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <form th:action="@{/admin/flashcards/save}" method="post">

                <div class="modal-header">
                    <h5 id="modalTitle">Create</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" name="id" id="flashcardId">

                    <input name="frontText" id="frontText" class="form-control mb-2" placeholder="Front">
                    <input name="backText" id="backText" class="form-control mb-2" placeholder="Back">
                    <input name="hint" id="hint" class="form-control mb-2" placeholder="Hint">
                    <input name="xpReward" id="xpReward" class="form-control mb-2" placeholder="XP">

                    <!-- LESSON SEARCH -->
                    <input type="text" id="lessonSearch" class="form-control"
                           placeholder="Search lesson..." autocomplete="off">

                    <input type="hidden" name="lessonId" id="lessonId">

                    <div id="lessonDropdown" class="dropdown-menu w-100">
                        <div class="dropdown-item"
                             th:each="l : ${lessons}"
                             th:attr="data-id=${l.id}, data-name=${l.lessonName}"
                             th:text="|[${l.id}] ${l.lessonName}|"
                             onclick="selectLesson(this)">
                        </div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary">Save</button>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const modal = new bootstrap.Modal(document.getElementById('flashcardModal'));

    function openCreateModal() {
        document.getElementById('flashcardId').value = '';
        document.getElementById('frontText').value = '';
        document.getElementById('backText').value = '';
        document.getElementById('hint').value = '';
        document.getElementById('xpReward').value = '';
        document.getElementById('lessonId').value = '';
        document.getElementById('lessonSearch').value = '';
        modal.show();
    }

    function openEditModal(id, front, back, hint, xp, lessonId, lessonName) {
        document.getElementById('flashcardId').value = id;
        document.getElementById('frontText').value = front;
        document.getElementById('backText').value = back;
        document.getElementById('hint').value = hint;
        document.getElementById('xpReward').value = xp;
        document.getElementById('lessonId').value = lessonId;
        document.getElementById('lessonSearch').value = `[${lessonId}] ${lessonName}`;
        modal.show();
    }

    const searchInput = document.getElementById('lessonSearch');
    const dropdown = document.getElementById('lessonDropdown');

    // show khi click
    searchInput.addEventListener('focus', () => {
        dropdown.classList.add('show');
    });

    // filter realtime
    searchInput.addEventListener('input', function () {
        const keyword = this.value.toLowerCase();
        const items = dropdown.querySelectorAll('.dropdown-item');

        items.forEach(item => {
            const text = item.innerText.toLowerCase();
            item.style.display = text.includes(keyword) ? 'block' : 'none';
        });

        dropdown.classList.add('show');
    });

    function selectLesson(el) {
        document.getElementById('lessonId').value = el.dataset.id;
        document.getElementById('lessonSearch').value = el.innerText;
        dropdown.classList.remove('show');
    }

    // click ngoài thì ẩn
    document.addEventListener('click', function (e) {
        if (!e.target.closest('#lessonSearch') && !e.target.closest('#lessonDropdown')) {
            dropdown.classList.remove('show');
        }
    });

    // bulk delete
    const selectAll = document.getElementById('selectAll');
    const checkboxes = document.querySelectorAll('.row-checkbox');
    const btn = document.getElementById('btnBulkDelete');

    function updateBtn() {
        const checked = document.querySelectorAll('.row-checkbox:checked').length;
        btn.classList.toggle('d-none', checked === 0);
    }

    selectAll.addEventListener('change', function () {
        checkboxes.forEach(cb => cb.checked = this.checked);
        updateBtn();
    });

    checkboxes.forEach(cb => cb.addEventListener('change', updateBtn));

    function submitBulkDelete() {
        if(confirm("Delete selected flashcards?")) {
            document.getElementById('bulkForm').submit();
        }
    }

    if (window.self !== window.top) {
        document.querySelector('.admin-sidebar')?.remove();
        document.querySelector('.admin-shell')?.style.setProperty('grid-template-columns', '1fr');
    }
</script>

</body>
</html>
