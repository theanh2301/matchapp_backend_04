<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Questions</title>
    <style>
        body { margin: 0; font-family: Segoe UI, sans-serif; background: #f5f7fb; color: #1f2937; }
        .admin-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .admin-sidebar { background: #0f172a; color: #fff; padding: 28px 18px; display: flex; flex-direction: column; gap: 18px; }
        .content { padding: 24px; }
        .toolbar, .search-card, .panel { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 8px 24px rgba(15, 23, 42, .08); margin-bottom: 16px; }
        .toolbar { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
        .toolbar-actions, .search-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input, select, textarea, button { font: inherit; }
        input, select, textarea { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 10px; width: 100%; box-sizing: border-box; }
        button, .btn-link { border: none; background: #2f56d9; color: #fff; padding: 10px 14px; border-radius: 10px; text-decoration: none; cursor: pointer; display: inline-block; }
        .btn-muted { background: #475569; }
        .btn-danger { background: #dc2626; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #e2e8f0; vertical-align: top; text-align: left; }
        .pagination { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; overflow-x: auto; padding-bottom: 4px; }
        .pagination a { padding: 8px 12px; border-radius: 8px; background: #e2e8f0; text-decoration: none; color: #0f172a; }
        .pagination a.active { background: #2f56d9; color: #fff; }
        .pagination span { padding: 8px 12px; border-radius: 8px; background: #e2e8f0; color: #475569; }
        .error { color: #b91c1c; margin-bottom: 12px; font-weight: 600; }
        .lookup { position: relative; }
        .lookup-menu { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; max-height: 220px; overflow: auto; background: #fff; border: 1px solid #cbd5e1; border-radius: 10px; box-shadow: 0 16px 32px rgba(15, 23, 42, .16); z-index: 20; }
        .lookup-menu.show { display: block; }
        .lookup-item { padding: 9px 12px; cursor: pointer; }
        .lookup-item:hover { background: #eff6ff; }
        button:disabled { cursor: not-allowed; opacity: .75; }
        .answer-line { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .answer-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 52px; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .answer-badge.ok { background: #dcfce7; color: #166534; }
        .answer-badge.bad { background: #fee2e2; color: #991b1b; }
        dialog { border: none; border-radius: 18px; width: min(760px, calc(100vw - 24px)); padding: 0; box-shadow: 0 24px 60px rgba(15, 23, 42, .25); }
        dialog::backdrop { background: rgba(15, 23, 42, .45); }
        .modal-head, .modal-body, .modal-foot { padding: 18px 20px; }
        .modal-head { border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .modal-foot { border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 10px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .answer-grid { display: grid; gap: 10px; }
        .answer-item { border: 1px solid #dbeafe; border-radius: 12px; padding: 12px; background: #f8fbff; }
        @media (max-width: 960px) { .admin-shell { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar(activeMenu=${activeMenu})}"></div>
    <main class="content">
        <section class="toolbar">
            <div>
                <h1>Practice Questions</h1>
                <div>Them, sua, xoa theo 1 cau hoi va 4 cau tra loi.</div>
            </div>
            <div class="toolbar-actions">
                <form id="bulkDeleteForm" th:action="@{/admin/practice-questions/bulk-delete}" method="post"></form>
                <button type="button" class="btn-danger" onclick="submitBulkDelete()">Xoa nhieu</button>
                <a class="btn-link btn-muted" th:href="@{/admin/practice-questions/export}">Export</a>
                <form th:action="@{/admin/practice-questions/import}" method="post" enctype="multipart/form-data" class="toolbar-actions js-import-form">
            <input type="file" name="file" accept=".xlsx" required style="max-width:220px;">
                    <button type="submit" class="btn-muted" data-loading-text="Dang import...">Import</button>
                </form>
                <button type="button" onclick="openCreate()">Them cau hoi</button>
            </div>
        </section>

        <section class="search-card">
            <div th:if="${message}" class="answer-badge ok" style="display:inline-flex; margin-bottom:12px;" th:text="${message}"></div>
            <div th:if="${error}" class="error" th:text="${error}"></div>
            <form class="search-row" method="get" th:action="@{/admin/practice-questions}">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="Tim theo cau hoi hoac bo practice">
                <button type="submit">Tim kiem</button>
            </form>
        </section>

        <section class="panel">
            <table>
                <thead>
                <tr>
                    <th><input type="checkbox" id="checkAll"></th>
                    <th>ID</th>
                    <th>Cau hoi</th>
                    <th>Practice</th>
                    <th>Do kho</th>
                    <th>XP</th>
                    <th>Dap an</th>
                    <th>Hanh dong</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(questions.content)}">
                    <td colspan="8">Khong co du lieu.</td>
                </tr>
                <tr th:each="q : ${questions.content}">
                    <td><input type="checkbox" class="row-check" th:value="${q.id}"></td>
                    <td th:text="${q.id}"></td>
                    <td th:text="${q.content}"></td>
                    <td th:text="${q.practiceTitle}"></td>
                    <td th:text="${q.difficulty}"></td>
                    <td th:text="${q.xpReward}"></td>
                    <td>
                        <div th:each="a : ${q.answers}" class="answer-line">
                            <span th:class="${a.isCorrect ? 'answer-badge ok' : 'answer-badge bad'}" th:text="${a.isCorrect ? 'Dung' : 'Sai'}"></span>
                            <span th:text="${a.content}"></span>
                        </div>
                    </td>
                    <td>
                        <button type="button"
                                th:attr="data-id=${q.id},
                                         data-content=${q.content},
                                         data-xp=${q.xpReward},
                                         data-practice=${q.practiceId},
                                         data-difficulty=${q.difficulty},
                                         data-a0-id=${q.answers.size() > 0 ? q.answers[0].id : ''},data-a0-content=${q.answers.size() > 0 ? q.answers[0].content : ''},data-a0-desc=${q.answers.size() > 0 ? q.answers[0].description : ''},data-a0-correct=${q.answers.size() > 0 ? q.answers[0].isCorrect : false},
                                         data-a1-id=${q.answers.size() > 1 ? q.answers[1].id : ''},data-a1-content=${q.answers.size() > 1 ? q.answers[1].content : ''},data-a1-desc=${q.answers.size() > 1 ? q.answers[1].description : ''},data-a1-correct=${q.answers.size() > 1 ? q.answers[1].isCorrect : false},
                                         data-a2-id=${q.answers.size() > 2 ? q.answers[2].id : ''},data-a2-content=${q.answers.size() > 2 ? q.answers[2].content : ''},data-a2-desc=${q.answers.size() > 2 ? q.answers[2].description : ''},data-a2-correct=${q.answers.size() > 2 ? q.answers[2].isCorrect : false},
                                         data-a3-id=${q.answers.size() > 3 ? q.answers[3].id : ''},data-a3-content=${q.answers.size() > 3 ? q.answers[3].content : ''},data-a3-desc=${q.answers.size() > 3 ? q.answers[3].description : ''},data-a3-correct=${q.answers.size() > 3 ? q.answers[3].isCorrect : false}"
                                onclick="openEdit(this)">
                            Sua
                        </button>
                        <a class="btn-link btn-danger" th:href="@{/admin/practice-questions/delete/{id}(id=${q.id})}" onclick="return confirm('Xoa cau hoi nay?')">Xoa</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="pagination" th:if="${questions.totalPages > 1}">
                <a th:if="${!questions.first}" th:href="@{/admin/practice-questions(page=0, keyword=${keyword})}">First</a>
                <a th:if="${!questions.first}" th:href="@{/admin/practice-questions(page=${questions.number - 1}, keyword=${keyword})}">Prev</a>
                <th:block th:each="i : ${#numbers.sequence(0, questions.totalPages - 1)}">
                    <span th:if="${i == 1 and questions.number > 3}">...</span>
                    <a th:if="${i == 0 or i == questions.totalPages - 1 or (i >= questions.number - 2 and i <= questions.number + 2)}"
                       th:href="@{/admin/practice-questions(page=${i}, keyword=${keyword})}"
                       th:text="${i + 1}"
                       th:classappend="${questions.number == i ? ' active' : ''}"></a>
                    <span th:if="${i == questions.totalPages - 2 and questions.number < questions.totalPages - 4}">...</span>
                </th:block>
                <a th:if="${!questions.last}" th:href="@{/admin/practice-questions(page=${questions.number + 1}, keyword=${keyword})}">Next</a>
                <a th:if="${!questions.last}" th:href="@{/admin/practice-questions(page=${questions.totalPages - 1}, keyword=${keyword})}">Last</a>
            </div>
        </section>
    </main>
</div>

<dialog id="questionDialog">
    <form th:action="@{/admin/practice-questions/save}" method="post" onsubmit="return syncCorrectAnswers()">
        <div class="modal-head">
            <h2 id="dialogTitle">Them cau hoi</h2>
            <button type="button" class="btn-muted" onclick="closeDialog()">Dong</button>
        </div>
        <div class="modal-body">
            <input type="hidden" name="id" id="questionId">
            <div class="grid-2">
                <div>
                    <label>Noi dung cau hoi</label>
                    <textarea name="content" id="content" rows="3" required></textarea>
                </div>
                <div>
                    <label>Practice</label>
                    <div class="lookup">
                        <input type="text" id="practiceSearch" placeholder="Go id hoac ten practice..." autocomplete="off" required>
                        <input type="hidden" name="practiceId" id="practiceId" required>
                        <div class="lookup-menu" id="practiceLookup">
                            <div class="lookup-item"
                                 th:each="practice : ${practices}"
                                 th:attr="data-id=${practice.id},data-name=${practice.title}"
                                 th:text="|[${practice.id}] ${practice.title}|"
                                 onclick="selectLookupItem(this, 'practice')"></div>
                        </div>
                    </div>
                    <label style="margin-top: 12px; display: block;">Do kho</label>
                    <select name="difficulty" id="difficulty" required>
                        <option value="EASY">EASY</option>
                        <option value="MEDIUM">MEDIUM</option>
                        <option value="HARD">HARD</option>
                    </select>
                    <label style="margin-top: 12px; display: block;">XP</label>
                    <input type="number" name="xpReward" id="xpReward" min="0" required>
                </div>
            </div>
            <div style="margin-top: 16px;">
                <label>4 cau tra loi</label>
                <div class="answer-grid">
                    <div class="answer-item" th:each="i : ${#numbers.sequence(0,3)}">
                        <input type="hidden" th:attr="name=${'answers[' + i + '].id'}" th:id="${'answer-id-' + i}">
                        <input type="hidden" th:attr="name=${'answers[' + i + '].isCorrect'}" th:id="${'answer-correct-' + i}">
                        <label th:text="|Dap an ${i + 1}|"></label>
                        <input type="text" th:attr="name=${'answers[' + i + '].content'}" th:id="${'answer-content-' + i}" required>
                        <label style="margin-top: 8px; display: block;">Mo ta</label>
                        <input type="text" th:attr="name=${'answers[' + i + '].description'}" th:id="${'answer-desc-' + i}">
                        <label style="margin-top: 8px; display: flex; gap: 8px; align-items: center;">
                            <input type="radio" name="correctIndex" th:value="${i}" required>
                            Dap an dung
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-foot">
            <button type="button" class="btn-muted" onclick="closeDialog()">Huy</button>
            <button type="submit">Luu</button>
        </div>
    </form>
</dialog>

<script>
    const dialog = document.getElementById('questionDialog');

    function openCreate() {
        document.getElementById('dialogTitle').textContent = 'Them cau hoi';
        document.getElementById('questionId').value = '';
        document.getElementById('content').value = '';
        document.getElementById('xpReward').value = '';
        document.getElementById('difficulty').value = 'EASY';
        document.getElementById('practiceId').value = '';
        document.getElementById('practiceSearch').value = '';
        for (let i = 0; i < 4; i++) {
            document.getElementById(`answer-id-${i}`).value = '';
            document.getElementById(`answer-content-${i}`).value = '';
            document.getElementById(`answer-desc-${i}`).value = '';
            document.getElementById(`answer-correct-${i}`).value = 'false';
        }
        document.querySelectorAll('input[name="correctIndex"]').forEach(r => r.checked = false);
        dialog.showModal();
    }

    function openEdit(button) {
        document.getElementById('dialogTitle').textContent = 'Sua cau hoi';
        document.getElementById('questionId').value = button.dataset.id;
        document.getElementById('content').value = button.dataset.content;
        document.getElementById('xpReward').value = button.dataset.xp;
        setLookupValue('practice', button.dataset.practice);
        document.getElementById('difficulty').value = button.dataset.difficulty;
        for (let i = 0; i < 4; i++) {
            document.getElementById(`answer-id-${i}`).value = button.dataset[`a${i}Id`] || '';
            document.getElementById(`answer-content-${i}`).value = button.dataset[`a${i}Content`] || '';
            document.getElementById(`answer-desc-${i}`).value = button.dataset[`a${i}Desc`] || '';
            const isCorrect = button.dataset[`a${i}Correct`] === 'true';
            document.getElementById(`answer-correct-${i}`).value = String(isCorrect);
            document.querySelector(`input[name="correctIndex"][value="${i}"]`).checked = isCorrect;
        }
        dialog.showModal();
    }

    function closeDialog() { dialog.close(); }

    function syncCorrectAnswers() {
        if (!document.getElementById('practiceId').value) {
            alert('Vui long chon practice tu danh sach goi y.');
            return false;
        }
        const checked = document.querySelector('input[name="correctIndex"]:checked');
        for (let i = 0; i < 4; i++) {
            document.getElementById(`answer-correct-${i}`).value = checked && checked.value === String(i) ? 'true' : 'false';
        }
        return true;
    }

    function submitBulkDelete() {
        const ids = Array.from(document.querySelectorAll('.row-check:checked')).map(el => el.value);
        if (!ids.length) { alert('Chua chon cau hoi nao.'); return; }
        if (!confirm('Xoa cac cau hoi da chon?')) { return; }
        const form = document.getElementById('bulkDeleteForm');
        form.innerHTML = '';
        ids.forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'ids';
            input.value = id;
            form.appendChild(input);
        });
        form.submit();
    }

    document.getElementById('checkAll').addEventListener('change', event => {
        document.querySelectorAll('.row-check').forEach(el => el.checked = event.target.checked);
    });

    function setLookupValue(prefix, id) {
        const item = document.querySelector(`#${prefix}Lookup .lookup-item[data-id="${id}"]`);
        document.getElementById(`${prefix}Id`).value = id || '';
        document.getElementById(`${prefix}Search`).value = item ? item.textContent.trim() : '';
    }

    function selectLookupItem(item, prefix) {
        document.getElementById(`${prefix}Id`).value = item.dataset.id;
        document.getElementById(`${prefix}Search`).value = item.textContent.trim();
        document.getElementById(`${prefix}Lookup`).classList.remove('show');
    }

    document.querySelectorAll('.lookup input[type="text"]').forEach(input => {
        input.addEventListener('focus', () => input.parentElement.querySelector('.lookup-menu').classList.add('show'));
        input.addEventListener('input', () => {
            document.getElementById(input.id.replace('Search', 'Id')).value = '';
            const keyword = input.value.toLowerCase();
            input.parentElement.querySelectorAll('.lookup-item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(keyword) ? 'block' : 'none';
            });
            input.parentElement.querySelector('.lookup-menu').classList.add('show');
        });
    });

    document.addEventListener('click', event => {
        if (!event.target.closest('.lookup')) {
            document.querySelectorAll('.lookup-menu').forEach(menu => menu.classList.remove('show'));
        }
    });

    document.querySelectorAll('.js-import-form').forEach(form => {
        form.addEventListener('submit', () => {
            const button = form.querySelector('button[type="submit"]');
            if (button) {
                button.disabled = true;
                button.textContent = button.dataset.loadingText || 'Dang xu ly...';
            }
        });
    });

    if (window.self !== window.top) {
        document.querySelector('.admin-sidebar')?.remove();
        const shell = document.querySelector('.admin-shell');
        if (shell) shell.style.gridTemplateColumns = '1fr';
    }
</script>
</body>
</html>
