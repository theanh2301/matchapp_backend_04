<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chapter Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background-color: #f4f7f6; margin: 0; }
    .admin-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .admin-content { padding: 24px; }
    .admin-sidebar {
      background: #0f172a;
      color: #ffffff;
      padding: 28px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .sidebar-brand a {
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      text-decoration: none;
    }
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar-nav a {
      color: #ffffff;
      text-decoration: none;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.35;
      transition: background-color .2s ease;
    }
    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: #2f56d9;
      color: #ffffff;
    }
    .sidebar-logout { margin-top: auto; }
    .sidebar-logout button {
      width: 100%;
      border: none;
      background: #ef4444;
      color: #ffffff;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn { border-radius: 8px; }

    /* dropdown custom */
    #subjectDropdown {
      display: none;
      position: absolute;
      width: 100%;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ddd;
      background: white;
      z-index: 1000;
      border-radius: 6px;
    }

    #subjectDropdown div {
      padding: 8px;
      cursor: pointer;
    }

    #subjectDropdown div:hover {
      background-color: #f1f1f1;
    }

    .position-relative {
      position: relative;
    }
  </style>
</head>

<body>
<div class="admin-shell">
  <div th:replace="~{admin/fragments/sidebar :: sidebar(activeMenu=${activeMenu})}"></div>
  <div class="admin-content">
<div class="container">
  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <!-- HEADER -->
  <div class="d-flex justify-content-between mb-3">
    <h3>Chapter Management</h3>

    <div>
      <button id="btnBulkDelete" class="btn btn-danger d-none" onclick="submitBulkDelete()">
        Delete Selected
      </button>

      <a href="/admin/chapters/export" class="btn btn-outline-secondary">Export</a>

      <button class="btn btn-primary" onclick="openCreateModal()">
        Create Chapter
      </button>
    </div>
  </div>

  <!-- SEARCH + IMPORT -->
  <div class="card mb-3">
    <div class="card-body d-flex justify-content-between">

      <form method="get" th:action="@{/admin/chapters}" class="d-flex">
        <input type="text" name="keyword" th:value="${keyword}" class="form-control"
               placeholder="Search chapter...">
        <button class="btn btn-primary ms-2">Search</button>
      </form>

      <form action="/admin/chapters/import" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button class="btn btn-success">Import</button>
      </form>

    </div>
  </div>

  <!-- TABLE -->
  <form id="bulkActionForm" action="/admin/chapters/bulk-delete" method="post">
    <table class="table table-bordered">

      <thead>
      <tr>
        <th><input type="checkbox" id="selectAll"></th>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Subject</th>
        <th>Action</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="c : ${chapters.content}">
        <td>
          <input type="checkbox" name="ids" th:value="${c.id}" class="row-checkbox">
        </td>
        <td th:text="${c.id}"></td>
        <td th:text="${c.chapterName}"></td>
        <td th:text="${c.description}"></td>
        <td th:text="${c.subject.subjectName}"></td>

        <td>
          <button type="button"
                  class="btn btn-sm btn-primary"
                  th:attr="onclick=|openEditModal(${c.id}, '${#strings.escapeJavaScript(c.chapterName)}', '${#strings.escapeJavaScript(c.description)}', ${c.subject.id}, '${#strings.escapeJavaScript(c.subject.subjectName)}')|">
            Edit
          </button>

          <a th:href="@{/admin/chapters/delete/{id}(id=${c.id})}"
             class="btn btn-sm btn-danger"
             onclick="return confirm('Delete?')">
            Delete
          </a>
        </td>
      </tr>
      </tbody>

    </table>
  </form>

  <!-- PAGINATION -->
  <ul class="pagination" th:if="${chapters.totalPages > 1}">

    <li class="page-item"
        th:classappend="${chapters.first ? ' disabled' : ''}">
      <a class="page-link"
         th:href="@{/admin/chapters(page=${chapters.first ? 0 : chapters.number - 1}, keyword=${keyword})}">
        Prev
      </a>
    </li>

    <li class="page-item"
        th:each="i : ${#numbers.sequence(0, chapters.totalPages - 1)}"
        th:classappend="${chapters.number == i ? ' active' : ''}">
      <a class="page-link"
         th:href="@{/admin/chapters(page=${i}, keyword=${keyword})}"
         th:text="${i + 1}">
      </a>
    </li>

    <li class="page-item"
        th:classappend="${chapters.last ? ' disabled' : ''}">
      <a class="page-link"
         th:href="@{/admin/chapters(page=${chapters.last ? chapters.number : chapters.number + 1}, keyword=${keyword})}">
        Next
      </a>
    </li>

  </ul>

</div>
</div>
</div>

<!-- ================= MODAL ================= -->

<div class="modal fade" id="chapterModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <form action="/admin/chapters/save" method="post">

        <div class="modal-header">
          <h5 id="modalTitle">Create</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <input type="hidden" name="id" id="chapterId">
          <input type="hidden" name="subjectId" id="selectedSubjectId">

          <label>Name *</label>
          <input name="chapterName" id="chapterName" class="form-control mb-2" required>

          <label>Description</label>
          <input name="description" id="description" class="form-control mb-2">

          <!-- SEARCH SUBJECT -->
          <label>Subject *</label>
          <div class="position-relative">
            <input type="text" id="subjectSearch" class="form-control"
                   placeholder="Type to search subject..." autocomplete="off">

            <div id="subjectDropdown">
              <div th:each="s : ${subjects}"
                   th:attr="data-id=${s.id}, data-name=${s.subjectName}"
                   th:text="${s.subjectName}">
              </div>
            </div>
          </div>

        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary">Save</button>
        </div>

      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const modal = new bootstrap.Modal(document.getElementById('chapterModal'));

  function openCreateModal() {
    document.getElementById('modalTitle').innerText = "Create Chapter";

    document.getElementById('chapterId').value = '';
    document.getElementById('chapterName').value = '';
    document.getElementById('description').value = '';
    document.getElementById('subjectSearch').value = '';
    document.getElementById('selectedSubjectId').value = '';

    modal.show();
  }

  function openEditModal(id, name, description, subjectId, subjectName) {
    document.getElementById('modalTitle').innerText = "Edit Chapter";

    document.getElementById('chapterId').value = id;
    document.getElementById('chapterName').value = name;
    document.getElementById('description').value = description;

    document.getElementById('subjectSearch').value = subjectName;
    document.getElementById('selectedSubjectId').value = subjectId;

    modal.show();
  }

  // ===== SUBJECT AUTOCOMPLETE =====
  const input = document.getElementById('subjectSearch');
  const dropdown = document.getElementById('subjectDropdown');

  input.addEventListener('focus', () => {
    dropdown.style.display = 'block';
  });

  input.addEventListener('keyup', function () {
    const keyword = this.value.toLowerCase();
    const items = dropdown.querySelectorAll('div');

    items.forEach(item => {
      const text = item.innerText.toLowerCase();
      item.style.display = text.includes(keyword) ? 'block' : 'none';
    });
  });

  dropdown.addEventListener('click', function (e) {
    if (e.target.dataset.id) {
      input.value = e.target.dataset.name;
      document.getElementById('selectedSubjectId').value = e.target.dataset.id;
      dropdown.style.display = 'none';
    }
  });

  document.addEventListener('click', function (e) {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.style.display = 'none';
    }
  });

  // ===== BULK DELETE =====
  const selectAll = document.getElementById('selectAll');
  const checkboxes = document.querySelectorAll('.row-checkbox');
  const btn = document.getElementById('btnBulkDelete');

  function updateBtn() {
    const checked = document.querySelectorAll('.row-checkbox:checked').length;
    btn.classList.toggle('d-none', checked === 0);
  }

  selectAll?.addEventListener('change', function () {
    checkboxes.forEach(cb => cb.checked = this.checked);
    updateBtn();
  });

  checkboxes.forEach(cb => cb.addEventListener('change', updateBtn));

  function submitBulkDelete() {
    if(confirm("Delete selected chapters?")) {
      document.getElementById('bulkActionForm').submit();
    }
  }

  if (window.self !== window.top) {
    document.querySelector('.admin-sidebar')?.remove();
    document.querySelector('.admin-shell')?.style.setProperty('grid-template-columns', '1fr');
  }
</script>

</body>
</html>
