<!DOCTYPE html>

<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lesson Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background-color: #f4f7f6; margin: 0; }
    .admin-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .admin-content { padding: 24px; }
    .admin-sidebar {
      background: #0f172a;
      color: #ffffff;
      padding: 28px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .sidebar-brand a {
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      text-decoration: none;
    }
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar-nav a {
      color: #ffffff;
      text-decoration: none;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.35;
      transition: background-color .2s ease;
    }
    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: #2f56d9;
      color: #ffffff;
    }
    .sidebar-logout { margin-top: auto; }
    .sidebar-logout button {
      width: 100%;
      border: none;
      background: #ef4444;
      color: #ffffff;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    .dropdown-custom {
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
    }
    #chapterDropdown {
      display: none;
    }

    #chapterDropdown.show {
      display: block;
    }
    button:disabled { cursor: not-allowed; opacity: .75; }
  </style>

</head>

<body>
<div class="admin-shell">
  <div th:replace="~{admin/fragments/sidebar :: sidebar(activeMenu=${activeMenu})}"></div>
  <div class="admin-content">
<div class="container">
  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  
  <!-- HEADER -->
  <div class="d-flex justify-content-between mb-3">
    <h3>Lesson Management</h3>

    <div>
      <button id="btnBulkDelete" class="btn btn-danger d-none" onclick="submitBulkDelete()">
        Delete Selected
      </button>

      <a href="/admin/lessons/export" class="btn btn-outline-secondary">Export</a>

      <button class="btn btn-primary" onclick="openCreateModal()">
        Create Lesson
      </button>
    </div>
  </div>

  <!-- SEARCH + IMPORT -->
  <div class="card mb-3">
    <div class="card-body d-flex justify-content-between">

      <form method="get" th:action="@{/admin/lessons}" class="d-flex">

        <div class="input-group">

          <input type="text"
                 name="keyword"
                 th:value="${keyword}"
                 class="form-control"
                 placeholder="Search lesson...">

          <button class="btn btn-primary">
            Search
          </button>

          <a th:if="${keyword != null and !#strings.isEmpty(keyword)}"
             th:href="@{/admin/lessons}"
             class="btn btn-outline-secondary">
            Reset
          </a>

        </div>

      </form>

      <form action="/admin/lessons/import" method="post" enctype="multipart/form-data" class="js-import-form">
        <input type="file" name="file" required>
        <button class="btn btn-success" data-loading-text="Importing...">Import</button>
      </form>

    </div>
  </div>

  <!-- TABLE -->
  <form id="bulkActionForm" action="/admin/lessons/bulk-delete" method="post">
    <table class="table table-bordered">

      <thead>
      <tr>
        <th><input type="checkbox" id="selectAll"></th>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Chapter</th>
        <th>Action</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="l : ${lessons.content}">
        <td><input type="checkbox" name="ids" th:value="${l.id}" class="row-checkbox"></td>

        <td th:text="${l.id}"></td>
        <td th:text="${l.lessonName}"></td>
        <td th:text="${l.description}"></td>

        <td th:text="${l.chapter != null ? l.chapter.chapterName : '-'}"></td>

        <td>
          <button type="button"
                  class="btn btn-sm btn-primary"
                  th:attr="onclick=|openEditModal(${l.id}, '${#strings.escapeJavaScript(l.lessonName)}', '${#strings.escapeJavaScript(l.description)}', ${l.chapter.id}, '${#strings.escapeJavaScript(l.chapter.chapterName)}')|">
            Edit
          </button>

          <a th:href="@{/admin/lessons/delete/{id}(id=${l.id})}"
             class="btn btn-sm btn-danger"
             onclick="return confirm('Delete?')">
            Delete
          </a>
        </td>
      </tr>
      </tbody>

    </table>
  </form>

  <!-- PAGINATION -->
  <nav th:if="${lessons.totalPages > 1}">
    <ul class="pagination justify-content-left flex-wrap">

      <!-- PREV -->
      <li class="page-item" th:classappend="${lessons.first} ? ' disabled'">
        <a class="page-link" th:href="@{/admin/lessons(page=0, keyword=${keyword})}">
          First
        </a>
      </li>

      <li class="page-item" th:classappend="${lessons.first} ? ' disabled'">
        <a class="page-link"
           th:with="prevPage=${lessons.first ? 0 : lessons.number - 1}"
           th:href="@{/admin/lessons(page=${prevPage}, keyword=${keyword})}">
          Prev
        </a>
      </li>

      <!-- PAGE NUMBERS -->
      <li class="page-item"
          th:each="i : ${#numbers.sequence(0, lessons.totalPages - 1)}"
          th:if="${i == 0 or i == lessons.totalPages - 1 or (i >= lessons.number - 2 and i <= lessons.number + 2)}"
          th:classappend="${lessons.number == i} ? ' active'">

        <a class="page-link"
           th:href="@{/admin/lessons(page=${i}, keyword=${keyword})}"
           th:text="${i + 1}">
        </a>
      </li>

      <!-- DOTS -->
      <li class="page-item disabled" th:if="${lessons.number > 3}">
        <span class="page-link">...</span>
      </li>

      <li class="page-item disabled" th:if="${lessons.number < lessons.totalPages - 4}">
        <span class="page-link">...</span>
      </li>

      <!-- NEXT -->
      <li class="page-item" th:classappend="${lessons.last} ? ' disabled'">
        <a class="page-link"
           th:with="nextPage=${lessons.last ? lessons.number : lessons.number + 1}"
           th:href="@{/admin/lessons(page=${nextPage}, keyword=${keyword})}">
          Next
        </a>
      </li>

      <li class="page-item" th:classappend="${lessons.last} ? ' disabled'">
        <a class="page-link" th:href="@{/admin/lessons(page=${lessons.totalPages - 1}, keyword=${keyword})}">
          Last
        </a>
      </li>

    </ul>
  </nav>

</div>
</div>
</div>

<!-- MODAL -->

<div class="modal fade" id="lessonModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <form th:action="@{/admin/lessons/save}" method="post" onsubmit="return validateLessonForm()">

        <div class="modal-header">
          <h5 id="modalTitle">Create Lesson</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <input type="hidden" name="id" id="lessonId">

          <label>Name *</label>
          <input name="lessonName" id="lessonName" class="form-control mb-2" required>

          <label>Description</label>
          <input name="description" id="description" class="form-control mb-2">

          <!-- SEARCH CHAPTER -->
          <label>Chapter *</label>

          <div class="position-relative">
            <input type="text"
                   id="chapterSearch"
                   class="form-control"
                   placeholder="Type to search chapter..."
                   autocomplete="off"
                   onclick="showDropdown()">

            <input type="hidden" name="chapterId" id="chapterId" required>

            <div id="chapterDropdown" class="dropdown-menu w-100" style="max-height:200px; overflow:auto;">
              <div class="dropdown-item"
                   th:each="c : ${chapters}"
                   th:attr="data-id=${c.id}, data-name=${c.chapterName}"
                   th:text="|[${c.id}] ${c.chapterName}|"
                   onclick="selectChapter(this)">
              </div>
            </div>
          </div>

        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary">Save</button>
        </div>

      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const modal = new bootstrap.Modal(document.getElementById('lessonModal'));

  function openCreateModal() {
    document.getElementById('modalTitle').innerText = 'Create Lesson';

    document.getElementById('lessonId').value = '';
    document.getElementById('lessonName').value = '';
    document.getElementById('description').value = '';
    document.getElementById('chapterId').value = '';
    document.getElementById('chapterSearch').value = '';

    modal.show();
  }

  function openEditModal(id, name, description, chapterId, chapterName) {

    document.getElementById('lessonId').value = id;
    document.getElementById('lessonName').value = name;
    document.getElementById('description').value = description;

    document.getElementById('chapterId').value = chapterId;
    document.getElementById('chapterSearch').value = `[${chapterId}] ${chapterName}`;

    modal.show();
  }

  // ===== AUTOCOMPLETE =====
  const searchInput = document.getElementById('chapterSearch');
  const dropdown = document.getElementById('chapterDropdown');

  function showDropdown() {
    dropdown.classList.add('show');
  }

  searchInput.addEventListener('input', function () {
    document.getElementById('chapterId').value = '';
    const keyword = this.value.toLowerCase();
    const items = dropdown.querySelectorAll('.dropdown-item');

    items.forEach(item => {
      const text = item.innerText.toLowerCase();
      item.style.display = text.includes(keyword) ? 'block' : 'none';
    });

    dropdown.classList.add('show');
  });

  function selectChapter(el) {
    const id = el.getAttribute('data-id');
    const name = el.getAttribute('data-name');

    document.getElementById('chapterId').value = id;
    document.getElementById('chapterSearch').value = `[${id}] ${name}`;

    dropdown.classList.remove('show');
  }

  document.addEventListener('click', function (e) {
    if (!e.target.closest('.position-relative')) {
      dropdown.classList.remove('show');
    }
  });

  // ===== BULK DELETE =====
  const selectAll = document.getElementById('selectAll');
  const checkboxes = document.querySelectorAll('.row-checkbox');
  const btn = document.getElementById('btnBulkDelete');

  function updateBtn() {
    const checked = document.querySelectorAll('.row-checkbox:checked').length;
    btn.classList.toggle('d-none', checked === 0);
  }

  selectAll?.addEventListener('change', function () {
    checkboxes.forEach(cb => cb.checked = this.checked);
    updateBtn();
  });

  checkboxes.forEach(cb => cb.addEventListener('change', updateBtn));

  function submitBulkDelete() {
    if(confirm("Delete selected lessons?")) {
      document.getElementById('bulkActionForm').submit();
    }
  }

  function validateLessonForm() {
    if (!document.getElementById('chapterId').value) {
      alert('Please select a chapter from suggestions.');
      return false;
    }
    return true;
  }

  document.querySelectorAll('.js-import-form').forEach(form => {
    form.addEventListener('submit', () => {
      const button = form.querySelector('button[type="submit"], button:not([type])');
      if (button) {
        button.disabled = true;
        button.textContent = button.dataset.loadingText || 'Processing...';
      }
    });
  });

  if (window.self !== window.top) {
    document.querySelector('.admin-sidebar')?.remove();
    document.querySelector('.admin-shell')?.style.setProperty('grid-template-columns', '1fr');
  }
</script>

</body>
</html>
