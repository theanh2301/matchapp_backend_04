<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Match Card Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    #lessonDropdown { display: none; max-height: 200px; overflow-y: auto; }
    #lessonDropdown.show { display: block; }
  </style>
</head>

<body>

<div class="container mt-4">

  <div class="d-flex justify-content-between mb-3">
    <h3>Match Card Management</h3>

    <div>
      <button id="btnBulkDelete" class="btn btn-danger d-none" onclick="submitBulkDelete()">
        Delete Selected
      </button>

      <a href="/admin/match-cards/export" class="btn btn-outline-secondary">Export</a>

      <button class="btn btn-primary" onclick="openCreateModal()">
        Create Pair
      </button>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body d-flex justify-content-between">

      <form method="get" th:action="@{/admin/match-cards}" class="d-flex">
        <div class="input-group">
          <input type="text" name="keyword" th:value="${keyword}" class="form-control"
                 placeholder="Search content...">
          <button class="btn btn-primary">Search</button>

          <a th:if="${keyword != null and !#strings.isEmpty(keyword)}"
             th:href="@{/admin/match-cards}"
             class="btn btn-outline-secondary">Reset</a>
        </div>
      </form>

      <form action="/admin/match-cards/import" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button class="btn btn-success">Import</button>
      </form>

    </div>
  </div>

  <form id="bulkForm" action="/admin/match-cards/bulk-delete" method="post">

    <table class="table table-bordered">
      <thead>
      <tr>
        <th><input type="checkbox" id="selectAll"></th>
        <th>Pair ID</th>
        <th>Content 1</th>
        <th>Content 2</th>
        <th>XP</th>
        <th>Lesson</th>
        <th>Action</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="p : ${pairs.content}">
        <td>
          <input type="checkbox"
                 name="selectedPairs"
                 th:value="|${p.pairId}-${p.lessonId}|"
                 class="row-checkbox">
        </td>

        <td th:text="${p.pairId}"></td>
        <td th:text="${p.content1}"></td>
        <td th:text="${p.content2}"></td>
        <td th:text="${p.xpReward}"></td>
        <td th:text="${p.lessonName}"></td>

        <td>
          <button type="button" class="btn btn-sm btn-primary"
                  th:attr="onclick=|openEditModal(${p.pairId}, '${#strings.escapeJavaScript(p.content1)}', '${#strings.escapeJavaScript(p.content2)}', ${p.xpReward}, ${p.lessonId}, '${#strings.escapeJavaScript(p.lessonName)}')|">
            Edit
          </button>

          <a th:href="@{/admin/match-cards/delete(pairId=${p.pairId}, lessonId=${p.lessonId})}"
             class="btn btn-sm btn-danger"
             onclick="return confirm('Delete?')">
            Delete
          </a>
        </td>
      </tr>

      <tr th:if="${pairs.content.size() == 0}">
        <td colspan="7" class="text-center">No data</td>
      </tr>
      </tbody>
    </table>
  </form>

  <nav th:if="${pairs.totalPages > 1}">
    <ul class="pagination justify-content-center">

      <li class="page-item" th:classappend="${pairs.first} ? ' disabled'">
        <a class="page-link"
           th:href="@{/admin/match-cards(page=${pairs.number - 1}, keyword=${keyword})}">
          Prev
        </a>
      </li>

      <li class="page-item"
          th:each="i : ${#numbers.sequence(0, pairs.totalPages - 1)}"
          th:classappend="${pairs.number == i} ? ' active'">
        <a class="page-link"
           th:href="@{/admin/match-cards(page=${i}, keyword=${keyword})}"
           th:text="${i + 1}"></a>
      </li>

      <li class="page-item" th:classappend="${pairs.last} ? ' disabled'">
        <a class="page-link"
           th:href="@{/admin/match-cards(page=${pairs.number + 1}, keyword=${keyword})}">
          Next
        </a>
      </li>

    </ul>
  </nav>

</div>

<div class="modal fade" id="matchModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <form th:action="@{/admin/match-cards/save}" method="post" onsubmit="return validateForm()">

        <div class="modal-header">
          <h5 id="modalTitle">Create Pair</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <input type="number" name="pairId" id="pairId" class="form-control mb-2" required>

          <input name="content1" id="content1" class="form-control mb-2" required>
          <input name="content2" id="content2" class="form-control mb-2" required>

          <input type="number" name="xpReward" id="xpReward" class="form-control mb-2" required>

          <input type="text" id="lessonSearch" class="form-control mb-2" required>
          <input type="hidden" name="lessonId" id="lessonId">

          <div id="lessonDropdown" class="dropdown-menu w-100">
            <div class="dropdown-item"
                 th:each="l : ${lessons}"
                 th:attr="data-id=${l.id}"
                 th:text="|[${l.id}] ${l.lessonName}|"
                 onclick="selectLesson(this)">
            </div>
          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary">Save</button>
        </div>

      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const modal = new bootstrap.Modal(document.getElementById('matchModal'));

  const modalTitle = document.getElementById('modalTitle');
  const pairId = document.getElementById('pairId');
  const content1 = document.getElementById('content1');
  const content2 = document.getElementById('content2');
  const xpReward = document.getElementById('xpReward');
  const lessonId = document.getElementById('lessonId');
  const lessonSearch = document.getElementById('lessonSearch');
  const lessonDropdown = document.getElementById('lessonDropdown');
  const selectAll = document.getElementById('selectAll');
  const btnBulkDelete = document.getElementById('btnBulkDelete');
  const bulkForm = document.getElementById('bulkForm');

  function openCreateModal() {
    modalTitle.innerText = "Create Pair";

    pairId.value = '';
    content1.value = '';
    content2.value = '';
    xpReward.value = '';
    lessonId.value = '';
    lessonSearch.value = '';

    modal.show();
  }

  function openEditModal(id, c1, c2, xp, lId, lName) {
    modalTitle.innerText = "Edit Pair";

    pairId.value = id;
    content1.value = c1;
    content2.value = c2;
    xpReward.value = xp;
    lessonId.value = lId;
    lessonSearch.value = `[${lId}] ${lName}`;

    modal.show();
  }

  function selectLesson(el) {
    lessonId.value = el.dataset.id;
    lessonSearch.value = el.innerText;
    lessonDropdown.classList.remove('show');
  }

  lessonSearch.onfocus = () => lessonDropdown.classList.add('show');

  function validateForm() {
    if (!lessonId.value) {
      alert("Please select lesson");
      return false;
    }

    if (content1.value.trim() === content2.value.trim()) {
      alert("2 contents must be different");
      return false;
    }

    return true;
  }

  selectAll.onchange = () => {
    document.querySelectorAll('.row-checkbox')
            .forEach(cb => cb.checked = selectAll.checked);
  };

  document.querySelectorAll('.row-checkbox').forEach(cb => {
    cb.onchange = () => {
      const anyChecked = document.querySelectorAll('.row-checkbox:checked').length > 0;
      btnBulkDelete.classList.toggle('d-none', !anyChecked);
    };
  });

  function submitBulkDelete() {
    if (confirm("Delete selected pairs?")) {
      bulkForm.submit();
    }
  }
</script>

</body>
</html>
