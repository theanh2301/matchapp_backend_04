<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Subject Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f7f6;
        }
        .btn {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between mb-3">
        <h3><i class="bi bi-book"></i> Subject Management</h3>

        <div>
            <button id="btnBulkDelete" class="btn btn-danger d-none" onclick="submitBulkDelete()">
                Delete Selected
            </button>

            <a href="/admin/subjects/export" class="btn btn-outline-secondary">Export</a>

            <button class="btn btn-primary" onclick="openCreateModal()">
                Create
            </button>
        </div>
    </div>

    <!-- SEARCH + IMPORT -->
    <div class="card mb-3">
        <div class="card-body d-flex justify-content-between">

            <form method="get" th:action="@{/admin/subjects}" class="d-flex">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control"
                       placeholder="Search subject name...">
                <button class="btn btn-primary ms-2">Search</button>
            </form>

            <form action="/admin/subjects/import" method="post" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <button class="btn btn-success">Import</button>
            </form>

        </div>
    </div>

    <!-- TABLE -->
    <form id="bulkActionForm" action="/admin/subjects/bulk-delete" method="post">

        <table class="table table-hover">
            <thead>
            <tr>
                <th><input type="checkbox" id="selectAll"></th>
                <th>ID</th>
                <th>Name</th>
                <th>Icon</th>
                <th>Grade</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${subjects == null || #lists.isEmpty(subjects.content)}">
                <td colspan="6" class="text-center">No data</td>
            </tr>

            <tr th:each="s : ${subjects.content}">
                <td>
                    <input type="checkbox" name="ids" th:value="${s.id}" class="row-checkbox">
                </td>

                <td th:text="${s.id}"></td>
                <td th:text="${s.subjectName}"></td>

                <td>
                    <i th:class="${s.icon}"></i>
                    <span th:text="${s.icon}"></span>
                </td>

                <td th:text="${s.grade != null ? s.grade.gradeName : '-'}"></td>

                <td>
                    <button type="button" class="btn btn-sm btn-primary"
                            th:attr="onclick=|openEditModal(${s.id}, '${#strings.escapeJavaScript(s.subjectName)}', '${s.icon}', ${s.grade != null ? s.grade.id : 0})|">
                        Edit
                    </button>

                    <a th:href="@{/admin/subjects/delete/{id}(id=${s.id})}"
                       onclick="return confirm('Delete this subject?')"
                       class="btn btn-sm btn-danger">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

    </form>

    <!-- PAGINATION -->
    <div th:if="${subjects.totalPages > 1}">
        <ul class="pagination">

            <li class="page-item" th:classappend="${subjects.first ? 'disabled' : ''}">
                <a class="page-link"
                   th:href="@{/admin/subjects(page=${subjects.number - 1}, keyword=${keyword})}">
                    Prev
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, subjects.totalPages - 1)}"
                th:classappend="${subjects.number == i ? 'active' : ''}">
                <a class="page-link"
                   th:href="@{/admin/subjects(page=${i}, keyword=${keyword})}"
                   th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:classappend="${subjects.last ? 'disabled' : ''}">
                <a class="page-link"
                   th:href="@{/admin/subjects(page=${subjects.number + 1}, keyword=${keyword})}">
                    Next
                </a>
            </li>

        </ul>
    </div>

</div>

<!-- ================= MODAL ================= -->

<div class="modal fade" id="subjectModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <form action="/admin/subjects/save" method="post">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Create Subject</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" name="id" id="subjectId">

                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" name="subjectName" id="subjectName" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Icon</label>
                        <input type="text" name="icon" id="subjectIcon" class="form-control" placeholder="bi-book">
                    </div>

                    <div class="mb-3">
                        <label>Grade</label>
                        <select name="gradeId" id="gradeId" class="form-select" required>
                            <option value="">-- Select Grade --</option>
                            <option th:each="g : ${grades}"
                                    th:value="${g.id}"
                                    th:text="${g.gradeName}">
                            </option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary">Save</button>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- ================= SCRIPT ================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const selectAll = document.getElementById('selectAll');
    const checkboxes = document.querySelectorAll('.row-checkbox');
    const btn = document.getElementById('btnBulkDelete');

    function updateBtn() {
        const checked = document.querySelectorAll('.row-checkbox:checked').length;
        btn.classList.toggle('d-none', checked === 0);
    }

    selectAll?.addEventListener('change', function () {
        checkboxes.forEach(cb => cb.checked = this.checked);
        updateBtn();
    });

    checkboxes.forEach(cb => cb.addEventListener('change', updateBtn));

    function submitBulkDelete() {
        if(confirm("Delete selected subjects?")) {
            document.getElementById('bulkActionForm').submit();
        }
    }

    const modal = new bootstrap.Modal(document.getElementById('subjectModal'));

    function openCreateModal() {
        document.getElementById('modalTitle').innerText = 'Create Subject';
        document.getElementById('subjectId').value = '';
        document.getElementById('subjectName').value = '';
        document.getElementById('subjectIcon').value = '';
        document.getElementById('gradeId').value = '';
        modal.show();
    }

    function openEditModal(id, name, icon, gradeId) {
        document.getElementById('modalTitle').innerText = 'Edit Subject';
        document.getElementById('subjectId').value = id;
        document.getElementById('subjectName').value = name;
        document.getElementById('subjectIcon').value = icon;
        document.getElementById('gradeId').value = gradeId;
        modal.show();
    }
</script>

</body>
</html>
