<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${subject.id == null} ? 'Add Subject' : 'Edit Subject'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card border-0 shadow-sm mx-auto" style="max-width: 600px;">
        <div class="card-header bg-white p-4">
            <h4 class="fw-bold mb-0" th:text="${subject.id == null} ? 'Create Subject' : 'Edit Subject'"></h4>
        </div>
        <div class="card-body p-4">
            <form th:object="${subject}" th:action="@{/admin/subjects/save}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label">Subject Name *</label>
                    <input th:field="*{subjectName}" class="form-control" required/>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Class (Lớp) *</label>
                        <input type="number" th:field="*{subjectClass}" class="form-control" required/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Grade *</label>
                        <select name="gradeId" class="form-select" required>
                            <option value="">-- Select Grade --</option>
                            <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.gradeName}"
                                    th:selected="${subject.grade != null and subject.grade.id == g.id}"></option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Icon Class (Bootstrap Icons)</label>
                    <input th:field="*{icon}" class="form-control" placeholder="e.g. bi-calculator"/>
                    <small class="text-muted">Example: bi-calculator, bi-brush, bi-globe</small>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="/admin/subjects" class="btn btn-light border">Cancel</a>
                    <button type="submit" class="btn btn-primary px-4">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
