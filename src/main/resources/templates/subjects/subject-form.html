<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject.id == null} ? 'Create Subject' : 'Edit Subject'"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.04);
            max-width: 800px;
            margin: 0 auto;
        }
        .card-header-custom {
            background-color: #fff;
            border-bottom: 1px solid rgba(0,0,0,.05);
            border-radius: 12px 12px 0 0;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
        }
        .form-control, .form-select {
            border-left: none;
        }
        .btn {
            border-radius: 8px;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <form id="subjectForm">

        <input type="hidden" id="subjectId" th:value="${subject.id}"/>

        <div class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Subject Name *</label>
                <input id="subjectName" class="form-control" required
                       th:value="${subject.subjectName}"/>
            </div>

            <div class="col-md-6">
                <label class="form-label">Icon</label>
                <input id="icon" class="form-control"
                       th:value="${subject.icon}"/>
            </div>

            <div class="col-md-6">
                <label class="form-label">Class *</label>
                <input type="number" id="subjectClass" class="form-control"
                       min="1" max="12" required
                       th:value="${subject.subjectClass}"/>
            </div>

        </div>

        <div id="errorBox" class="alert alert-danger mt-3 d-none"></div>

        <hr>

        <div class="d-flex justify-content-end gap-2">
            <a href="/subjects" class="btn btn-light border">Cancel</a>
            <button type="submit" class="btn btn-primary">
                Save
            </button>
        </div>

    </form>
</div>

</body>
</html>
